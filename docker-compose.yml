version: "3.9"

services:
  retrieval:
    build:
      context: .
      dockerfile: services/retrieval/Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    volumes:
      - ./artifacts:/app/artifacts:ro
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8001
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - RETRIEVAL_URL=http://retrieval:8002
      - BUG_HUNTER_URL=http://bug-hunter:8003
      - SECURITY_SCANNER_URL=http://security-scanner:8004
      - PERF_ADVISOR_URL=http://perf-advisor:8005
      - GITHUB_CLIENT_URL=http://github-client:8006
    restart: unless-stopped

  bug-hunter:
    build:
      context: .
      dockerfile: services/bug-hunter/Dockerfile
    ports:
      - "8003:8003"
    env_file: .env
    restart: unless-stopped

  security-scanner:
    build:
      context: .
      dockerfile: services/security-scanner/Dockerfile
    ports:
      - "8004:8004"
    env_file: .env
    restart: unless-stopped

  perf-advisor:
    build:
      context: .
      dockerfile: services/perf-advisor/Dockerfile
    ports:
      - "8005:8005"
    env_file: .env
    restart: unless-stopped

  github-client:
    build:
      context: .
      dockerfile: services/github-client/Dockerfile
    ports:
      - "8006:8006"
    env_file: .env
    restart: unless-stopped