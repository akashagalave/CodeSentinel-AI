apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: codesentinel
  labels:
    app: orchestrator
    app.kubernetes.io/part-of: codesentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
        app.kubernetes.io/part-of: codesentinel
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: default
      containers:
        - name: orchestrator
          image: 618015514032.dkr.ecr.us-east-1.amazonaws.com/codesentinel/orchestrator:latest
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - secretRef:
                name: codesentinel-secrets
          env:
            - name: RETRIEVAL_URL
              value: "http://retrieval-svc:8002"
            - name: BUG_HUNTER_URL
              value: "http://bug-hunter-svc:8003"
            - name: SECURITY_SCANNER_URL
              value: "http://security-scanner-svc:8004"
            - name: PERF_ADVISOR_URL
              value: "http://perf-advisor-svc:8005"
            - name: GITHUB_CLIENT_URL
              value: "http://github-client-svc:8006"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3