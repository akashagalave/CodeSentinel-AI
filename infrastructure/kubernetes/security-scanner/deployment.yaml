apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-scanner
  namespace: codesentinel
  labels:
    app: security-scanner
    app.kubernetes.io/part-of: codesentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: security-scanner
  template:
    metadata:
      labels:
        app: security-scanner
        app.kubernetes.io/part-of: codesentinel
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8004"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: security-scanner
          image: 618015514032.dkr.ecr.us-east-1.amazonaws.com/codesentinel/security-scanner:latest
          ports:
            - containerPort: 8004
              name: http
          envFrom:
            - secretRef:
                name: codesentinel-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
