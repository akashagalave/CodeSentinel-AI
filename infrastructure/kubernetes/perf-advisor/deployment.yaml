apiVersion: apps/v1
kind: Deployment
metadata:
  name: perf-advisor
  namespace: codesentinel
  labels:
    app: perf-advisor
    app.kubernetes.io/part-of: codesentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: perf-advisor
  template:
    metadata:
      labels:
        app: perf-advisor
        app.kubernetes.io/part-of: codesentinel
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8005"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: perf-advisor
          image: 618015514032.dkr.ecr.us-east-1.amazonaws.com/codesentinel/perf-advisor:latest
          ports:
            - containerPort: 8005
              name: http
          envFrom:
            - secretRef:
                name: codesentinel-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
