apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: codesentinel-monitor
  namespace: codesentinel
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: codesentinel
  endpoints:
    - port: http
      path: /metrics
      interval: 15s