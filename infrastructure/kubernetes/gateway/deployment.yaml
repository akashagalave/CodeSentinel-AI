apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: codesentinel
  labels:
    app: gateway
    app.kubernetes.io/part-of: codesentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        app.kubernetes.io/part-of: codesentinel
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gateway
          image: 618015514032.dkr.ecr.us-east-1.amazonaws.com/codesentinel/gateway:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: codesentinel-secrets
          env:
            - name: ORCHESTRATOR_URL
              value: "http://orchestrator-svc:8001"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3